spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///payment_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false # Use Hibernate DDL for tests

  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    consumer:
      auto-offset-reset: earliest

catalyst:
  payment:
    stripe:
      api-key: sk_test_123
      webhook-secret: whsec_test_secret
    trial:
      duration-days: 7
    tiers:
      professional:
        monthly-price-id: price_prof_monthly
        annual-price-id: price_prof_annual
        monthly-amount: 29.00
        annual-amount: 290.00
      clinic:
        monthly-price-id: price_clinic_monthly
        annual-price-id: price_clinic_annual
        monthly-amount: 99.00
        annual-amount: 990.00
    kafka:
      topics:
        dlq: payment.dlq

logging:
  level:
    com.catalyst.payment: DEBUG
    org.hibernate.SQL: DEBUG
