# Payment Service Configuration
# This is a placeholder for Phase 3 implementation

spring:
  application:
    name: payment-service
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:catalyst}?currentSchema=payment
    username: ${DB_USERNAME:catalyst}
    password: ${DB_PASSWORD:catalyst}
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}

# Catalyst Security Configuration
catalyst:
  security:
    jwt:
      secret: ${JWT_SECRET:your-256-bit-secret-key-for-development-only}
      access-token-expiration: 15m
      refresh-token-expiration: 7d
      issuer: catalyst-api
    
    cors:
      allowed-origins:
        - http://localhost:3000
    
    rate-limit:
      enabled: true
      anonymous:
        requests-per-minute: 30
        burst: 10
      authenticated:
        requests-per-minute: 100
        burst: 20
    
    crypto:
      encryption-key: ${ENCRYPTION_KEY:32-character-encryption-key-dev}
      bcrypt-strength: 12

# Logging
logging:
  level:
    com.catalyst: DEBUG
    org.springframework.security: DEBUG

