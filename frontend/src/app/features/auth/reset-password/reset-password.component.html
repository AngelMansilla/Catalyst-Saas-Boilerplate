<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-title">Set new password</h1>
      <p class="auth-subtitle">Must be at least 8 characters</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
      <mat-form-field appearance="outline">
        <mat-label>New password</mat-label>
        <input
          matInput
          [type]="hidePassword() ? 'password' : 'text'"
          formControlName="password"
          autocomplete="new-password"
        />
        <button mat-icon-button matSuffix type="button" (click)="hidePassword.set(!hidePassword())">
          <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="form.get('password')?.hasError('required')">Required</mat-error>
        <mat-error *ngIf="form.get('password')?.hasError('minlength')">At least 8 characters</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Confirm password</mat-label>
        <input
          matInput
          [type]="hidePassword() ? 'password' : 'text'"
          formControlName="confirmPassword"
          autocomplete="new-password"
        />
        <mat-error *ngIf="form.hasError('passwordMismatch')">Passwords do not match</mat-error>
      </mat-form-field>

      <button
        mat-flat-button
        color="primary"
        type="submit"
        class="auth-submit"
        [disabled]="form.invalid || loading()"
      >
        @if (loading()) {
          <mat-spinner diameter="20" />
        } @else {
          Reset password
        }
      </button>
    </form>

    <p class="auth-footer">
      <a routerLink="/auth/login" class="auth-link">Back to sign in</a>
    </p>
  </div>
</div>
